<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklynn Page</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        h1, h2, h3 {
            color: #111;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
       
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        .merged-center {
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>My Website</h1>
    
    <h2>Overview</h2>
    <p>This is a cleaner, lightweight webpage hosted on <a href="https://pages.github.com/">GitHub Pages</a>.</p>
    
    <h3>Project Details</h3>
    
    <table>
        <tr>
            <th>Task</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Write HTML</td>
            <td>Complete</td>
        </tr>
        <tr>
            <td colspan="2" class="merged-center">Review Phase (Merged Cell)</td>
        </tr>
        <tr>
            <td>Publish to GitHub</td>
            <td>Pending</td>
        </tr>
    </table>

</body>
</html>
